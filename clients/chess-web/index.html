<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Chinese Chess 中國象棋</title>
    <meta name="description" content="Play Chinese chess (xiangqi 象棋), banqi 暗棋, and three-kingdom banqi 三國暗棋 in your browser. Local pass-and-play or online multiplayer rooms. Open source Rust + WASM client."/>
    <meta name="theme-color" content="#1a1614"/>

    <!-- PWA install / standalone hints. The manifest is rendered at
         build time by `scripts/build-pwa.sh` from
         `public/manifest.webmanifest.tmpl` so `start_url` / `scope`
         match the actual deployment base path (server root vs.
         GitHub Pages subpath). -->
    <link rel="manifest" href="manifest.webmanifest"/>
    <link rel="icon" type="image/svg+xml" href="icons/favicon.svg"/>
    <link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <meta name="apple-mobile-web-app-title" content="象棋"/>

    <!-- Open Graph (Facebook, LinkedIn, Discord, iMessage, …) -->
    <meta property="og:type" content="website"/>
    <meta property="og:site_name" content="Chinese Chess 中國象棋"/>
    <meta property="og:title" content="Chinese Chess 中國象棋 — play xiangqi & banqi in your browser"/>
    <meta property="og:description" content="Pass-and-play or online multiplayer for xiangqi 象棋, banqi 暗棋, and three-kingdom banqi 三國暗棋. Open source Rust + WASM, no install."/>
    <meta property="og:url" content="https://daviddwlee84.github.io/Chinese-Chess_Xiangqi/"/>
    <meta property="og:image" content="https://daviddwlee84.github.io/Chinese-Chess_Xiangqi/og-image.png"/>
    <meta property="og:image:width" content="1200"/>
    <meta property="og:image:height" content="630"/>
    <meta property="og:image:alt" content="Chinese Chess 中國象棋 share card with the red 帥 piece on a dark board background"/>
    <meta property="og:locale" content="en_US"/>
    <meta property="og:locale:alternate" content="zh_TW"/>
    <meta property="og:locale:alternate" content="zh_CN"/>

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image"/>
    <meta name="twitter:title" content="Chinese Chess 中國象棋"/>
    <meta name="twitter:description" content="Play xiangqi 象棋, banqi 暗棋, and three-kingdom banqi 三國暗棋 in your browser. Local or online multiplayer."/>
    <meta name="twitter:image" content="https://daviddwlee84.github.io/Chinese-Chess_Xiangqi/og-image.png"/>

    <link data-trunk rel="rust"/>
    <link data-trunk rel="css" href="style.css"/>
    <link data-trunk rel="copy-file" href="og-image.png"/>

    <!-- PWA assets — copied verbatim into dist/. The .tmpl files are
         rewritten in place by the post-build hook (see Trunk.toml). -->
    <link data-trunk rel="copy-file" href="public/sw.js.tmpl"/>
    <link data-trunk rel="copy-file" href="public/manifest.webmanifest.tmpl"/>
    <link data-trunk rel="copy-file" href="public/pwa.js"/>
    <link data-trunk rel="copy-file" href="public/jsQR.min.js"/>
    <link data-trunk rel="copy-dir"  href="public/icons"/>
    <script src="pwa.js" defer></script>
    <!-- jsQR (~130 KB minified, ~38 KB gzipped) is loaded LAZILY by
         qr_decode.rs::ensure_loaded() the first time the LAN camera
         scanner mounts. The asset is copied to dist/ via the
         copy-file directive above; the dynamic loader uses an
         absolute URL based on window.location.origin so it works
         regardless of the current SPA route or deployment base
         path (server vs GitHub Pages /Chinese-Chess_Xiangqi/). -->
</head>
<body>
    <div id="boot-loader" class="boot-loader" role="status" aria-live="polite">
        <div class="boot-card">
            <div class="boot-mark" aria-hidden="true">帥</div>
            <p class="boot-kicker">Chinese Chess</p>
            <h1>Loading board engine</h1>
            <p class="boot-copy">
                Downloading and starting the Rust WASM client. First load can take longer on remote links.
            </p>
            <div class="boot-progress" aria-hidden="true"><span></span></div>
        </div>
    </div>
    <noscript>
        <p class="boot-noscript">JavaScript and WebAssembly are required to play Chinese Chess in the browser.</p>
    </noscript>
    <script>
        window.addEventListener("TrunkApplicationStarted", () => {
            const loader = document.getElementById("boot-loader");
            if (!loader) return;
            loader.classList.add("boot-loader--done");
            window.setTimeout(() => loader.remove(), 180);
        });
    </script>
</body>
</html>
